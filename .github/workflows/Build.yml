name: Build and Release Windows EXE

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      # 【核心修复】直接在这里写明所有需要的库，彻底告别 requirements.txt 丢失烦恼！
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 opencv-python numpy pynput pywin32 Pillow
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller -F -w main.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: "自动点击器 V1.1 (构建号: ${{ github.run_number }})"
        body: "这是由 GitHub Actions 全自动打包的最新 Windows 执行文件。"
        files: dist/main.exe
