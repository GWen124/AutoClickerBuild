name: Build and Release Windows EXE

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 opencv-python numpy pynput pywin32 Pillow
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller -F -w main.py

    # 【核心修改】在这里指定您想要的中文名字和版本号
    - name: Rename Executable
      shell: pwsh
      run: |
        Rename-Item -Path "dist\main.exe" -NewName "自动点击工具_V1.4.exe"

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: "自动点击工具 V1.4 (构建号: ${{ github.run_number }})"
        body: "这是由 GitHub Actions 全自动打包的最新 Windows 执行文件。"
        # 【核心修改】确保这里上传的文件名和上面改的名字完全一致
        files: dist/自动点击工具_V1.4.exe
