name: Build and Release Windows EXE

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 opencv-python numpy pynput pywin32 Pillow
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller -F -w main.py

    # 【全自动命名开关】利用 github.run_number 自动获取当前构建次数
    # 格式设置为 v1.流水号。例如第15次更新代码，就会自动命名为 AutoClicker_Build_v1.15.exe
    - name: Rename Executable
      shell: pwsh
      run: |
        Rename-Item -Path "dist\main.exe" -NewName "AutoClicker_Build_v1.${{ github.run_number }}.exe"

    # 【自动发布开关】发行版的标题和文件也会全自动匹配上面的版本号
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: "自动点击器 (自动构建版 v1.${{ github.run_number }})"
        body: "这是由 GitHub Actions 全自动打包的最新 Windows 执行文件。版本号已随本次代码更新自动递增。"
        files: dist/AutoClicker_Build_v1.${{ github.run_number }}.exe
