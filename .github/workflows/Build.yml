name: Build and Release Windows EXE

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 opencv-python numpy pynput pywin32 Pillow
        pip install pyinstaller

    # 在打包前自动通过正则匹配替换 Python 源码中的标题版本号
    - name: Update Version in Python Script
      shell: pwsh
      run: |
        $scriptPath = "AutoClicker.py" 
        (Get-Content $scriptPath) -replace 'AutoClicker V1\.\d+', 'AutoClicker V1.${{ github.run_number }}' | Set-Content -Path $scriptPath -Encoding UTF8

    # 打包指定的 AutoClicker.py
    - name: Build with PyInstaller
      run: pyinstaller -F -w AutoClicker.py

    # 自动重命名打包后的文件，使最终用户下载的 exe 名称携带最新的版本号
    - name: Rename Executable
      shell: pwsh
      run: |
        Rename-Item -Path "dist\AutoClicker.exe" -NewName "AutoClicker_V1.${{ github.run_number }}.exe"

    # 全自动发布
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: "AutoClicker V1.${{ github.run_number }}"
        body: "这是由 GitHub Actions 全自动打包的最新 Windows 执行文件。软件界面标题和执行文件名均已随本次提交自动同步至 V1.${{ github.run_number }}。"
        files: dist/*.exe
