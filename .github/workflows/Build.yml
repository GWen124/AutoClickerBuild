name: Build and Release Windows EXE

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 opencv-python numpy pynput pywin32 Pillow
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller -F -w main.py

    # 【新增功能】将生成的 main.exe 重命名为：自动点击工具_Build构建号.exe
    - name: Rename Executable
      shell: pwsh
      run: |
        Rename-Item -Path "dist\main.exe" -NewName "AutoClicker_Build${{ github.run_number }}.exe"

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: "自动点击器 (自动构建版本: ${{ github.run_number }})"
        body: "这是由 GitHub Actions 全自动打包的最新 Windows 执行文件。文件已自动附加版本号。"
        files: dist/AutoClicker_Build${{ github.run_number }}.exe
